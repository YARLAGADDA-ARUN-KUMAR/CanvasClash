version: '3.9'

services:
  server:
    build: ./server
    container_name: dev_server
    ports:
      - '3000:3000'
    env_file:
      - ./env/server.env
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  client:
    build: ./client
    container_name: dev_client
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - server
    restart: unless-stopped
